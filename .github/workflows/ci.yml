name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  linux-build-test:
    name: Linux Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libuv1-dev \
            lua5.4 \
            liblua5.4-dev \
            python3

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: linux-build-logs
          path: |
            build/Testing/
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  windows-msys2-build-test:
    name: Windows MSYS2 Build And Test
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-libuv
            mingw-w64-ucrt-x86_64-lua
            mingw-w64-ucrt-x86_64-python

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          PATH: /ucrt64/bin:$PATH
        run: ctest --test-dir build --output-on-failure

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: windows-msys2-test-logs
          path: |
            build/Testing/
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/luagent.exe artifacts/
          cp build/host_client.exe artifacts/
          cp /ucrt64/bin/libuv-1.dll artifacts/
          cp /ucrt64/bin/lua54.dll artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-msys2-build
          path: artifacts/*
