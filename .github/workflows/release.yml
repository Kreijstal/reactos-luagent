name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string
      name:
        description: Release title, defaults to the tag
        required: false
        type: string
      target:
        description: Branch or commit to release from
        required: true
        default: master
        type: string
      notes:
        description: Optional release notes
        required: false
        type: string
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean
      draft:
        description: Create the release as a draft
        required: true
        default: false
        type: boolean
      generate_notes:
        description: Let GitHub generate release notes
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libuv1-dev \
            lua5.4 \
            liblua5.4-dev \
            python3

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          set -eu
          tag='${{ inputs.tag }}'
          pkg="reactos-luagent-${tag}-linux-x86_64"
          root="dist/${pkg}"
          mkdir -p "${root}/bin" "${root}/lua" "${root}/tools" "${root}/docs"
          cp build/luagent "${root}/bin/"
          cp build/host_client "${root}/bin/"
          cp lua/bootstrap.lua "${root}/lua/"
          cp tools/client_daemon.py "${root}/tools/"
          cp README.md "${root}/"
          cp docs/*.md "${root}/docs/"
          tar -C dist -czf "dist/${pkg}.tar.gz" "${pkg}"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-package
          path: dist/*.tar.gz

  build-windows:
    name: Build Windows Release Artifact
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target }}

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-libuv
            mingw-w64-ucrt-x86_64-lua
            mingw-w64-ucrt-x86_64-python

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          PATH: /ucrt64/bin:$PATH
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          set -eu
          tag='${{ inputs.tag }}'
          pkg="reactos-luagent-${tag}-windows-ucrt64"
          root="dist/${pkg}"
          mkdir -p "${root}/bin" "${root}/lua" "${root}/tools" "${root}/docs"
          cp build/luagent.exe "${root}/bin/"
          cp build/host_client.exe "${root}/bin/"
          cp /ucrt64/bin/libuv-1.dll "${root}/bin/"
          cp /ucrt64/bin/lua54.dll "${root}/bin/"
          cp lua/bootstrap.lua "${root}/lua/"
          cp tools/client_daemon.py "${root}/tools/"
          cp README.md "${root}/"
          cp docs/*.md "${root}/docs/"
          python - <<'PY'
          import pathlib
          import zipfile

          dist = pathlib.Path("dist")
          pkg_name = "reactos-luagent-${{ inputs.tag }}-windows-ucrt64"
          root = dist / pkg_name
          archive = dist / f"{pkg_name}.zip"

          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(dist))
          PY

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-package
          path: dist/*.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.name }}
          RELEASE_TARGET: ${{ inputs.target }}
          RELEASE_NOTES: ${{ inputs.notes }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_GENERATE_NOTES: ${{ inputs.generate_notes }}
        run: |
          set -eu
          title="${RELEASE_NAME}"
          if [ -z "${title}" ]; then
            title="${RELEASE_TAG}"
          fi

          notes_file="$(mktemp)"
          if [ -n "${RELEASE_NOTES}" ]; then
            printf '%s\n' "${RELEASE_NOTES}" > "${notes_file}"
          fi

          args=(
            "${RELEASE_TAG}"
            release-artifacts/linux-release-package/*
            release-artifacts/windows-release-package/*
            --target "${RELEASE_TARGET}"
            --title "${title}"
          )

          if [ "${RELEASE_DRAFT}" = "true" ]; then
            args+=(--draft)
          fi
          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ -n "${RELEASE_NOTES}" ]; then
            args+=(--notes-file "${notes_file}")
          elif [ "${RELEASE_GENERATE_NOTES}" = "true" ]; then
            args+=(--generate-notes)
          fi

          gh release create "${args[@]}"
